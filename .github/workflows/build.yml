name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一分支并发运行只保留最新一个
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 基础 lint + 语法（所有平台通用）────────────────────
  lint:
    name: lint (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # PyQt6-sip 有时需要显式安装
          pip install PyQt6-sip 2>/dev/null || true
          # PyQt6 在 headless 环境可能装不上，跳过（py_compile 不需要运行时加载）
          pip install PyQt6 --only-binary=:all: || echo "PyQt6 跳过（headless）"

      - name: py_compile all .py
        run: |
          set -e
          for f in $(find . -maxdepth 2 -name "*.py" -not -path "./.venv/*"); do
            python -m py_compile "$f"
          done

      - name: Validate workflow YAMLs
        run: |
          python -c "
          import yaml, glob, sys
          for p in glob.glob('.github/workflows/*.yml'):
              with open(p) as f:
                  yaml.safe_load(f)
              print('  OK:', p)
          "

      - name: Validate PyInstaller spec (syntax only)
        run: |
          python -c "
          import ast
          with open('PreDiligenceLab.spec') as f:
              ast.parse(f.read())
          print('  spec syntax OK')
          "

  # ── 2. Windows 烟囱测试 ──────────────────────────────────
  windows:
    name: build (windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller spec syntax + import check
        run: |
          python -c "import ast; ast.parse(open('PreDiligenceLab.spec').read()); print('  spec syntax OK on Windows')"
          python -c "import PyInstaller; print(f'  PyInstaller {PyInstaller.__version__} importable on Windows')"
          python -c "from PyInstaller.utils.hooks import collect_submodules; mods = collect_submodules('PyQt6'); print(f'  PyQt6 submodules: {len(mods)}')"

      - name: PyInstaller dry-run build
        run: |
          pyinstaller PreDiligenceLab.spec --noconfirm --clean
          if (-not (Test-Path "dist/PreDiligenceLab/PreDiligenceLab.exe")) {
            Write-Error "EXE not found — dry-run build failed"
            exit 1
          }
          Write-Host "  Windows build OK"

  # ── 3. macOS 烟囱测试 ──────────────────────────────────
  macos:
    name: build (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps + PyInstaller
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt --break-system-packages
          pip3 install pyinstaller --break-system-packages

      - name: Verify spec + PyInstaller on macOS
        run: |
          python3 -c "import ast; ast.parse(open('PreDiligenceLab.spec').read()); print('  spec syntax OK on macOS')"
          python3 -c "from PyInstaller.utils.hooks import collect_submodules; mods = collect_submodules('PyQt6'); print(f'  PyQt6 submodules: {len(mods)}')"

      - name: PyInstaller dry-run build (.app)
        run: |
          pyinstaller PreDiligenceLab.spec --noconfirm --clean
          if [ ! -d "dist/PreDiligenceLab.app" ]; then
            echo "ERROR: .app not found — dry-run build failed"
            exit 1
          fi
          echo "  macOS build OK"
